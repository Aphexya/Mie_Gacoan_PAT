<script>
const SERVER_URL = window.location.protocol + "//" + window.location.hostname + ":5000";

function switchTab(name) {
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  event.currentTarget.classList.add('active');
}

// ── STOK PUSAT ────────────────────────────────────────────────────
function loadStokPusat() {
  fetch(`/api/proxy_stok_pusat`) 
    .then(r => r.json())
    .then(data => {
      data.forEach(item => {
        const el = document.getElementById(`pusat-${item.id_bahan}`);
        if (el) el.textContent = item.stok;
      });
    })
    .catch(err => {
      console.log('Gagal muat stok pusat:', err);
      document.querySelectorAll('[id^="pusat-"]').forEach(el => el.textContent = 'ERR');
    });
}

// Fungsi untuk mengganti tipe IN/OUT tanpa reload
function setTipe(val) {
  document.getElementById('tipe-input').value = val;
  document.getElementById('btn-out').classList.toggle('active', val === 'OUT');
  document.getElementById('btn-in').classList.toggle('active', val === 'IN');
}

// Fungsi untuk menambah baris bahan secara dinamis
function tambahRow() {
  const row = document.querySelector('.item-row').cloneNode(true);
  row.querySelectorAll('input').forEach(i => i.value = ''); // Kosongkan input di baris baru
  document.getElementById('item-list').appendChild(row);
}

// Fungsi untuk menghapus baris bahan
function hapusRow(btn) {
  if (document.querySelectorAll('.item-row').length > 1) {
    btn.closest('.item-row').remove();
  }
}

// Load stok pusat saat page load
loadStokPusat();
// Refresh setiap 10 detik
setInterval(loadStokPusat, 10000);
</script>
