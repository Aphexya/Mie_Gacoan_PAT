<style>
  :root {
    --bg: #080c12;
    --surface: #0f1520;
    --surface2: #161e2e;
    --border: #1e2d45;
    --accent: #3b82f6;
    --accent2: #60a5fa;
    --green: #10b981;
    --red: #ef4444;
    --yellow: #f59e0b;
    --text: #e2e8f0;
    --muted: #64748b;
    --font: 'Syne', sans-serif;
    --mono: 'DM Mono', monospace;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:var(--font); min-height:100vh; }

  /* TOPBAR */
  .topbar {
    display:flex; align-items:center; justify-content:space-between;
    padding:0 2rem; height:60px;
    background:var(--surface); border-bottom:1px solid var(--border);
    position:sticky; top:0; z-index:100;
  }
  .logo { display:flex; align-items:center; gap:.75rem; }
  .logo-icon {
    width:36px; height:36px; background:var(--accent);
    border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:1.1rem;
  }
  .logo-text { font-size:1rem; font-weight:800; }
  .logo-text span { color:var(--accent2); }
  .badge-cabang {
    background:rgba(59,130,246,.2); border:1px solid rgba(59,130,246,.4);
    color:var(--accent2); font-size:.65rem; font-weight:700;
    padding:.2rem .6rem; border-radius:20px; letter-spacing:1px;
  }
  .topbar-right { display:flex; align-items:center; gap:1rem; }
  .server-status { display:flex; align-items:center; gap:.4rem; }
  .dot { width:7px; height:7px; border-radius:50%; }
  .dot.on  { background:var(--green); box-shadow:0 0 6px var(--green); animation:pulse 2s infinite; }
  .dot.off { background:var(--red);   box-shadow:0 0 6px var(--red); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
  .server-label { font-size:.75rem; font-family:var(--mono); }
  .pending-badge {
    background:rgba(245,158,11,.15); border:1px solid rgba(245,158,11,.3);
    color:var(--yellow); font-size:.7rem; font-family:var(--mono);
    padding:.2rem .6rem; border-radius:20px;
  }
  .btn-sm {
    background:var(--surface2); border:1px solid var(--border);
    color:var(--muted); padding:.4rem .9rem; border-radius:6px;
    font-family:var(--font); font-size:.78rem; cursor:pointer; transition:.2s;
    text-decoration:none; display:inline-block;
  }
  .btn-sm:hover { color:var(--text); border-color:var(--accent); }
  .btn-logout { }
  .btn-logout:hover { color:var(--red) !important; border-color:var(--red) !important; }

  /* LAYOUT */
  .container { max-width:1200px; margin:0 auto; padding:2rem; }
  .page-header { margin-bottom:2rem; }
  .page-header h1 { font-size:1.5rem; font-weight:800; }
  .page-header p { color:var(--muted); font-size:.85rem; margin-top:.25rem; font-family:var(--mono); }

  /* TABS */
  .tabs { display:flex; gap:.5rem; margin-bottom:2rem; border-bottom:1px solid var(--border); padding-bottom:0; }
  .tab {
    padding:.6rem 1.25rem; font-size:.85rem; font-weight:600; cursor:pointer;
    border-radius:6px 6px 0 0; color:var(--muted); border:none;
    background:transparent; font-family:var(--font); transition:.2s;
    border-bottom:2px solid transparent; margin-bottom:-1px;
  }
  .tab:hover { color:var(--text); }
  .tab.active { color:var(--accent2); border-bottom-color:var(--accent); }

  .tab-content { display:none; }
  .tab-content.active { display:block; }

  /* CARD */
  .card {
    background:var(--surface); border:1px solid var(--border);
    border-radius:12px; overflow:hidden; margin-bottom:1.5rem;
  }
  .card-header {
    padding:1rem 1.5rem; border-bottom:1px solid var(--border);
    display:flex; align-items:center; justify-content:space-between;
  }
  .card-header h3 { font-size:.9rem; font-weight:700; }
  .card-body { padding:1.5rem; }

  /* STOK GRID */
  .stok-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:1rem; }
  .stok-item {
    background:var(--surface2); border:1px solid var(--border);
    border-radius:10px; padding:1rem; text-align:center;
  }
  .stok-nama { font-size:.8rem; color:var(--muted); margin-bottom:.4rem; }
  .stok-angka { font-size:2rem; font-weight:800; line-height:1; }
  .stok-angka.ok     { color:var(--green); }
  .stok-angka.warn   { color:var(--yellow); }
  .stok-angka.danger { color:var(--red); }
  .stok-satuan { font-size:.7rem; color:var(--muted); margin-top:.25rem; font-family:var(--mono); }

  /* FORM TRANSAKSI */
  .form-grid { display:grid; grid-template-columns:1fr 1fr; gap:1.5rem; }
  .form-group { margin-bottom:1.25rem; }
  label { display:block; font-size:.72rem; color:var(--muted); letter-spacing:.5px; margin-bottom:.4rem; text-transform:uppercase; }
  select, input[type=number], input[type=text], input[type=password] {
    width:100%; background:var(--surface2); border:1px solid var(--border);
    color:var(--text); font-family:var(--mono); font-size:.9rem;
    padding:.65rem 1rem; border-radius:8px; outline:none; transition:.2s;
    appearance:none;
  }
  select:focus, input:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(59,130,246,.1); }
  .tipe-toggle { display:flex; gap:.5rem; margin-bottom:1.5rem; }
  .tipe-btn {
    flex:1; padding:.65rem; border-radius:8px; border:1px solid var(--border);
    background:var(--surface2); color:var(--muted); font-family:var(--font);
    font-size:.85rem; font-weight:600; cursor:pointer; transition:.2s; text-align:center;
  }
  .tipe-btn.out.active { background:rgba(239,68,68,.15); border-color:var(--red); color:var(--red); }
  .tipe-btn.in.active  { background:rgba(16,185,129,.15); border-color:var(--green); color:var(--green); }

  /* ITEM LIST in form */
  .item-list { display:flex; flex-direction:column; gap:.75rem; margin-bottom:1.25rem; }
  .item-row {
    display:grid; grid-template-columns:1fr 120px 36px; gap:.5rem; align-items:end;
  }
  .btn-del {
    width:36px; height:36px; background:rgba(239,68,68,.1); border:1px solid rgba(239,68,68,.3);
    color:var(--red); border-radius:6px; cursor:pointer; font-size:1rem;
    display:flex; align-items:center; justify-content:center; flex-shrink:0;
  }
  .btn-del:hover { background:rgba(239,68,68,.25); }
  .btn-add {
    background:transparent; border:1px dashed var(--border);
    color:var(--muted); font-family:var(--font); font-size:.8rem;
    padding:.55rem 1rem; border-radius:8px; cursor:pointer;
    width:100%; transition:.2s; margin-bottom:1.25rem;
  }
  .btn-add:hover { border-color:var(--accent); color:var(--accent2); }
  .btn-submit {
    width:100%; background:linear-gradient(135deg,var(--accent),var(--accent2));
    border:none; color:#fff; font-family:var(--font); font-weight:800;
    font-size:.95rem; padding:.8rem; border-radius:8px; cursor:pointer;
    letter-spacing:.5px; transition:.2s;
  }
  .btn-submit:hover { opacity:.9; transform:translateY(-1px); }
  .btn-sync {
    background:linear-gradient(135deg,var(--green),#34d399);
    border:none; color:#000; font-family:var(--font); font-weight:800;
    font-size:.85rem; padding:.55rem 1.25rem; border-radius:8px; cursor:pointer; transition:.2s;
  }
  .btn-sync:hover { opacity:.9; }

  /* TABLE */
  table { width:100%; border-collapse:collapse; font-size:.83rem; }
  th {
    text-align:left; padding:.6rem 1rem; font-size:.65rem;
    letter-spacing:1.5px; color:var(--muted); text-transform:uppercase;
    border-bottom:1px solid var(--border);
  }
  td { padding:.75rem 1rem; border-bottom:1px solid rgba(255,255,255,.04); }
  tr:last-child td { border-bottom:none; }
  tr:hover td { background:rgba(255,255,255,.02); }
  .table-wrap { max-height:380px; overflow-y:auto; }
  .table-wrap::-webkit-scrollbar { width:4px; }
  .table-wrap::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }

  .badge {
    font-size:.63rem; font-weight:700; padding:.2rem .55rem;
    border-radius:20px; letter-spacing:.5px; font-family:var(--mono);
  }
  .badge-synced  { background:rgba(16,185,129,.15); color:var(--green); }
  .badge-pending { background:rgba(245,158,11,.15); color:var(--yellow); }
  .badge-failed  { background:rgba(239,68,68,.15); color:var(--red); }
  .badge-in      { background:rgba(59,130,246,.15); color:var(--accent2); }
  .badge-out     { background:rgba(239,68,68,.15); color:var(--red); }

  /* ALERT */
  .alert {
    padding:.75rem 1rem; border-radius:8px; font-size:.83rem; margin-bottom:1.25rem;
  }
  .alert-ok  { background:rgba(16,185,129,.1); border:1px solid rgba(16,185,129,.3); color:var(--green); }
  .alert-err { background:rgba(239,68,68,.1); border:1px solid rgba(239,68,68,.3); color:var(--red); }
  .alert-info { background:rgba(59,130,246,.1); border:1px solid rgba(59,130,246,.3); color:var(--accent2); }

  /* LOGIN */
  .login-wrap {
    min-height:100vh; display:flex; align-items:center; justify-content:center;
    background:radial-gradient(ellipse at 40% 60%, rgba(59,130,246,.07) 0%, transparent 60%), var(--bg);
  }
  .login-card {
    background:var(--surface); border:1px solid var(--border);
    border-radius:16px; padding:2.5rem; width:380px;
  }
  .login-logo { text-align:center; margin-bottom:2rem; }
  .login-logo .icon { font-size:2.5rem; margin-bottom:.5rem; }
  .login-logo h2 { font-size:1.2rem; font-weight:800; }
  .login-logo p { font-size:.8rem; color:var(--muted); margin-top:.25rem; }
  .btn-login {
    width:100%; background:linear-gradient(135deg,var(--accent),var(--accent2));
    border:none; color:#fff; font-family:var(--font); font-weight:800;
    font-size:.95rem; padding:.8rem; border-radius:8px; cursor:pointer; transition:.2s; margin-top:.5rem;
  }
  .btn-login:hover { opacity:.9; transform:translateY(-1px); }
  .alert-error {
    background:rgba(239,68,68,.1); border:1px solid rgba(239,68,68,.3);
    color:var(--red); padding:.6rem 1rem; border-radius:6px; font-size:.8rem; margin-bottom:1rem;
  }
</style>
